<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥦 ブロッコリーシューター 🥦</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Orbitron', 'Noto Sans JP', sans-serif;
            overflow: hidden;
        }

        #gameWrapper {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow:
                0 0 40px rgba(76, 175, 80, 0.3),
                0 0 80px rgba(76, 175, 80, 0.1),
                inset 0 0 60px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
        }

        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #scoreDisplay {
            position: absolute;
            top: 16px;
            left: 20px;
            color: #a5d6a7;
            font-size: 14px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.8);
            letter-spacing: 2px;
        }

        #scoreDisplay .score-value {
            font-size: 28px;
            color: #e8f5e9;
            display: block;
            margin-top: 2px;
        }

        #waveDisplay {
            position: absolute;
            top: 16px;
            right: 20px;
            color: #ffcc80;
            font-size: 14px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 152, 0, 0.8);
            letter-spacing: 2px;
            text-align: right;
        }

        #waveDisplay .wave-value {
            font-size: 28px;
            color: #fff3e0;
            display: block;
            margin-top: 2px;
        }

        #livesDisplay {
            position: absolute;
            top: 70px;
            left: 20px;
            font-size: 22px;
            filter: drop-shadow(0 0 6px rgba(244, 67, 54, 0.6));
        }

        #comboDisplay {
            position: absolute;
            top: 70px;
            right: 20px;
            color: #ce93d8;
            font-size: 14px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(156, 39, 176, 0.8);
            letter-spacing: 2px;
            text-align: right;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #comboDisplay .combo-value {
            font-size: 24px;
            color: #f3e5f5;
            display: block;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, rgba(10, 10, 26, 0.85) 0%, rgba(10, 10, 26, 0.95) 100%);
            pointer-events: all;
            z-index: 10;
        }

        #gameOverScreen {
            display: none;
        }

        .title {
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(135deg, #66bb6a, #43a047, #81c784);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            text-align: center;
            animation: titlePulse 2s ease-in-out infinite;
        }

        .subtitle {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 16px;
            color: #a5d6a7;
            margin-bottom: 40px;
            letter-spacing: 4px;
        }

        @keyframes titlePulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(76, 175, 80, 0.5)); }
            50% { filter: drop-shadow(0 0 40px rgba(76, 175, 80, 0.9)); }
        }

        .broccoli-hero {
            font-size: 80px;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .start-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            padding: 16px 48px;
            border: 2px solid #4caf50;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.2), rgba(76, 175, 80, 0.05));
            color: #a5d6a7;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            pointer-events: all;
            position: relative;
            overflow: hidden;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(76, 175, 80, 0.15), transparent 60%);
            animation: btnGlow 3s ease-in-out infinite;
        }

        @keyframes btnGlow {
            0%, 100% { transform: translate(-30%, -30%); }
            50% { transform: translate(30%, 30%); }
        }

        .start-btn:hover {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.4), rgba(76, 175, 80, 0.15));
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.4);
            transform: scale(1.05);
            color: #e8f5e9;
        }

        .controls-info {
            font-family: 'Noto Sans JP', sans-serif;
            margin-top: 30px;
            color: #616161;
            font-size: 12px;
            text-align: center;
            line-height: 2;
        }

        .controls-info kbd {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            padding: 2px 8px;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            color: #9e9e9e;
        }

        .game-over-title {
            font-size: 36px;
            font-weight: 900;
            color: #ef5350;
            text-shadow: 0 0 30px rgba(244, 67, 54, 0.6);
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 16px;
            color: #bdbdbd;
            margin-bottom: 8px;
        }

        .final-score-value {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd54f, #ff9800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
        }

        .high-score-text {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 14px;
            color: #ffcc80;
            margin-bottom: 30px;
        }

        #powerUpIndicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd54f;
            font-size: 13px;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(255, 213, 79, 0.8);
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .sub-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 700;
            padding: 10px 22px;
            border: 1px solid rgba(76, 175, 80, 0.4);
            background: rgba(76, 175, 80, 0.1);
            color: #a5d6a7;
            border-radius: 25px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            pointer-events: all;
        }

        .sub-btn:hover {
            background: rgba(76, 175, 80, 0.25);
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
            color: #e8f5e9;
        }

        .gameover-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        #rankingModal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, rgba(10, 10, 26, 0.92) 0%, rgba(10, 10, 26, 0.98) 100%);
            pointer-events: all;
            z-index: 20;
        }

        .ranking-title {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd54f, #ff9800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        .ranking-list {
            width: 85%;
            max-height: 380px;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .ranking-list::-webkit-scrollbar {
            width: 4px;
        }

        .ranking-list::-webkit-scrollbar-thumb {
            background: rgba(76, 175, 80, 0.3);
            border-radius: 2px;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            margin-bottom: 4px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }

        .ranking-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .ranking-top3 {
            border-color: rgba(255, 213, 79, 0.2);
            background: rgba(255, 213, 79, 0.05);
        }

        .ranking-rank {
            width: 32px;
            font-size: 16px;
            text-align: center;
            color: #bdbdbd;
        }

        .ranking-top3 .ranking-rank {
            font-size: 20px;
        }

        .ranking-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            margin: 0 8px;
        }

        .ranking-name {
            flex: 1;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 13px;
            color: #e0e0e0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ranking-score {
            font-size: 14px;
            font-weight: 700;
            color: #ffd54f;
            text-shadow: 0 0 8px rgba(255, 213, 79, 0.4);
            letter-spacing: 1px;
        }

        .ranking-loading, .ranking-empty, .ranking-error {
            font-family: 'Noto Sans JP', sans-serif;
            text-align: center;
            color: #757575;
            padding: 40px 0;
            font-size: 14px;
        }

        .ranking-error {
            color: #ef5350;
        }

        .ranking-local {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 13px;
            color: #81c784;
            margin-bottom: 16px;
            text-shadow: 0 0 8px rgba(76, 175, 80, 0.4);
        }
    </style>
</head>
<body>
    <div id="gameWrapper">
        <canvas id="gameCanvas"></canvas>
        <div id="uiOverlay">
            <div id="scoreDisplay">SCORE<span class="score-value">0</span></div>
            <div id="waveDisplay">WAVE<span class="wave-value">1</span></div>
            <div id="livesDisplay"></div>
            <div id="comboDisplay">COMBO<span class="combo-value">x1</span></div>
            <div id="powerUpIndicator"></div>
        </div>

        <div id="startScreen">
            <div class="broccoli-hero">🥦</div>
            <div class="title">BROCCOLI<br>SHOOTER</div>
            <div class="subtitle">ブロッコリーシューター</div>
            <button class="start-btn" onclick="startGame()">START</button>
            <div class="controls-info">
                <kbd>←</kbd> <kbd>→</kbd> 移動 ／ <kbd>SPACE</kbd> 発射<br>
                マウス・タッチ操作にも対応
            </div>
            <button class="sub-btn" onclick="showRanking()" style="margin-top: 16px;">🏆 RANKING</button>
        </div>

        <div id="gameOverScreen">
            <div class="game-over-title">GAME OVER</div>
            <div class="final-score">FINAL SCORE</div>
            <div class="final-score-value" id="finalScoreValue">0</div>
            <div class="high-score-text" id="highScoreText"></div>
            <button class="start-btn" onclick="startGame()">RETRY</button>
            <div class="gameover-actions">
                <button class="sub-btn" onclick="openScoreRegistration()">🏆 スコアを登録</button>
                <button class="sub-btn" onclick="showRanking()">📊 RANKING</button>
            </div>
        </div>

        <div id="rankingModal">
            <div class="ranking-title">🏆 RANKING</div>
            <div id="rankingList" class="ranking-list">
                <div class="ranking-loading">読み込み中...</div>
            </div>
            <div class="ranking-local">あなたのベスト: <span id="rankingLocalScore">0</span> pts</div>
            <button class="sub-btn" onclick="hideRanking()">✕ 閉じる</button>
        </div>
    </div>

    <script>
    // ===== GAME CONFIG =====
    const CONFIG = {
        WIDTH: 480,
        HEIGHT: 720,
        PLAYER_SPEED: 6,
        BULLET_SPEED: 10,
        ENEMY_BASE_SPEED: 1.5,
        FIRE_RATE: 180, // ms between shots
        STAR_COUNT: 120,
        PARTICLE_COUNT: 8,
    };

    // ===== CANVAS SETUP =====
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = CONFIG.WIDTH;
    canvas.height = CONFIG.HEIGHT;

    // ===== GAME STATE =====
    let game = {
        running: false,
        score: 0,
        lives: 3,
        wave: 1,
        combo: 0,
        maxCombo: 0,
        comboTimer: 0,
        highScore: parseInt(localStorage.getItem('broccoliHighScore') || '0'),
        lastFireTime: 0,
        powerUp: null,
        powerUpTimer: 0,
        shakeAmount: 0,
        waveEnemiesLeft: 0,
        waveTransition: false,
        waveTransitionTimer: 0,
        slowMotion: false,
        slowMotionTimer: 0,
    };

    let player = null;
    let bullets = [];
    let enemies = [];
    let particles = [];
    let powerUps = [];
    let stars = [];
    let floatingTexts = [];

    // ===== INPUT =====
    const keys = {};
    let mouseX = CONFIG.WIDTH / 2;
    let mouseDown = false;
    let useMouseControl = false;

    document.addEventListener('keydown', e => {
        keys[e.code] = true;
        if (e.code === 'Space') e.preventDefault();
    });
    document.addEventListener('keyup', e => { keys[e.code] = false; });

    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouseX = (e.clientX - rect.left) * (CONFIG.WIDTH / rect.width);
        useMouseControl = true;
    });
    canvas.addEventListener('mousedown', e => {
        mouseDown = true;
        useMouseControl = true;
    });
    canvas.addEventListener('mouseup', () => { mouseDown = false; });

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        mouseX = (e.touches[0].clientX - rect.left) * (CONFIG.WIDTH / rect.width);
        useMouseControl = true;
        mouseDown = true;
    }, { passive: false });
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        mouseX = (e.touches[0].clientX - rect.left) * (CONFIG.WIDTH / rect.width);
        useMouseControl = true;
        mouseDown = true;
    }, { passive: false });
    canvas.addEventListener('touchend', () => { mouseDown = false; });

    // ===== STARS (BACKGROUND) =====
    function initStars() {
        stars = [];
        for (let i = 0; i < CONFIG.STAR_COUNT; i++) {
            stars.push({
                x: Math.random() * CONFIG.WIDTH,
                y: Math.random() * CONFIG.HEIGHT,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 1.5 + 0.3,
                brightness: Math.random() * 0.5 + 0.3,
                twinkle: Math.random() * Math.PI * 2,
            });
        }
    }

    // ===== PLAYER =====
    function createPlayer() {
        return {
            x: CONFIG.WIDTH / 2,
            y: CONFIG.HEIGHT - 70,
            width: 42,
            height: 42,
            invincible: 0,
            thruster: 0,
        };
    }

    // ===== BULLET (BROCCOLI) =====
    function fireBullet() {
        const now = Date.now();
        const rate = game.powerUp === 'rapid' ? CONFIG.FIRE_RATE / 2 : CONFIG.FIRE_RATE;
        if (now - game.lastFireTime < rate) return;
        game.lastFireTime = now;

        const spread = game.powerUp === 'triple' ? [-12, 0, 12] : [0];
        spread.forEach(offset => {
            bullets.push({
                x: player.x + offset,
                y: player.y - 20,
                size: game.powerUp === 'big' ? 22 : 14,
                speed: CONFIG.BULLET_SPEED,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.3,
                damage: game.powerUp === 'big' ? 3 : 1,
            });
        });

        // Muzzle flash particles
        for (let i = 0; i < 3; i++) {
            particles.push({
                x: player.x,
                y: player.y - 15,
                vx: (Math.random() - 0.5) * 3,
                vy: -Math.random() * 4 - 2,
                life: 15,
                maxLife: 15,
                size: Math.random() * 4 + 2,
                color: `hsl(${120 + Math.random() * 20}, 70%, ${60 + Math.random() * 30}%)`,
            });
        }
    }

    // ===== ENEMIES =====
    const ENEMY_TYPES = [
        { emoji: '🍅', hp: 1, size: 30, score: 100, speed: 1 },
        { emoji: '🌽', hp: 2, size: 32, score: 200, speed: 0.8 },
        { emoji: '🍆', hp: 3, size: 34, score: 300, speed: 0.7 },
        { emoji: '🥕', hp: 1, size: 26, score: 150, speed: 1.5 },
        { emoji: '🍄', hp: 4, size: 38, score: 500, speed: 0.5 },
        { emoji: '🎃', hp: 6, size: 44, score: 800, speed: 0.4 },
    ];

    function spawnEnemy() {
        const waveIndex = Math.min(game.wave - 1, ENEMY_TYPES.length - 1);
        const availableTypes = ENEMY_TYPES.slice(0, waveIndex + 2);
        const type = availableTypes[Math.floor(Math.random() * availableTypes.length)];

        const speedMult = 1 + (game.wave - 1) * 0.1;
        enemies.push({
            ...type,
            x: Math.random() * (CONFIG.WIDTH - 60) + 30,
            y: -type.size,
            currentHp: type.hp,
            speed: type.speed * CONFIG.ENEMY_BASE_SPEED * speedMult,
            wobble: Math.random() * Math.PI * 2,
            wobbleSpeed: Math.random() * 0.03 + 0.01,
            wobbleAmount: Math.random() * 40 + 20,
            flash: 0,
        });
    }

    function startWave() {
        game.waveEnemiesLeft = 5 + game.wave * 3;
        game.waveTransition = false;
    }

    // ===== POWER-UPS =====
    const POWERUP_TYPES = [
        { type: 'triple', emoji: '🔱', label: 'トリプルショット', color: '#64b5f6' },
        { type: 'rapid', emoji: '⚡', label: 'ラピッドファイア', color: '#ffd54f' },
        { type: 'big', emoji: '💪', label: 'メガブロッコリー', color: '#ef5350' },
        { type: 'heal', emoji: '💚', label: 'ライフ回復', color: '#66bb6a' },
    ];

    function spawnPowerUp(x, y) {
        if (Math.random() > 0.15) return;
        const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
        powerUps.push({
            ...type,
            x, y,
            vy: 1.5,
            size: 20,
            time: 0,
        });
    }

    // ===== PARTICLES & EFFECTS =====
    function spawnExplosion(x, y, color, count = CONFIG.PARTICLE_COUNT) {
        for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
            const speed = Math.random() * 5 + 2;
            particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 30 + Math.random() * 20,
                maxLife: 50,
                size: Math.random() * 6 + 2,
                color: color || `hsl(${Math.random() * 60 + 10}, 90%, 60%)`,
            });
        }
    }

    function spawnFloatingText(x, y, text, color = '#fff') {
        floatingTexts.push({
            x, y, text, color,
            life: 60,
            maxLife: 60,
            vy: -2,
        });
    }

    // ===== COLLISION =====
    function circleCollision(a, b, ra, rb) {
        const dx = a.x - b.x;
        const dy = a.y - b.y;
        return dx * dx + dy * dy < (ra + rb) * (ra + rb);
    }

    // ===== DRAW HELPERS =====
    function drawBroccoli(x, y, size, rotation = 0) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation);
        ctx.font = `${size}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🥦', 0, 0);
        ctx.restore();
    }

    function drawEmoji(emoji, x, y, size) {
        ctx.font = `${size}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(emoji, x, y);
    }

    function drawPlayer() {
        if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) return;

        ctx.save();
        ctx.translate(player.x, player.y);

        // Thruster glow
        player.thruster += 0.15;
        const thrusterSize = 8 + Math.sin(player.thruster) * 3;
        const gradient = ctx.createRadialGradient(0, 24, 0, 0, 24, thrusterSize * 2);
        gradient.addColorStop(0, 'rgba(76, 175, 80, 0.8)');
        gradient.addColorStop(0.5, 'rgba(76, 175, 80, 0.3)');
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(0, 24, thrusterSize * 2, 0, Math.PI * 2);
        ctx.fill();

        // Player ship body (triangle shape)
        ctx.fillStyle = '#2e7d32';
        ctx.shadowColor = '#4caf50';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.moveTo(0, -22);
        ctx.lineTo(-18, 18);
        ctx.lineTo(-6, 12);
        ctx.lineTo(0, 16);
        ctx.lineTo(6, 12);
        ctx.lineTo(18, 18);
        ctx.closePath();
        ctx.fill();

        // Inner detail
        ctx.fillStyle = '#43a047';
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.moveTo(0, -14);
        ctx.lineTo(-10, 12);
        ctx.lineTo(0, 8);
        ctx.lineTo(10, 12);
        ctx.closePath();
        ctx.fill();

        // Cockpit broccoli
        ctx.font = '18px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🥦', 0, 0);

        ctx.restore();
    }

    // ===== UPDATE =====
    function update(dt) {
        const timeMult = game.slowMotion ? 0.4 : 1;

        // Screen shake decay
        game.shakeAmount *= 0.9;

        // Combo timer
        if (game.combo > 0) {
            game.comboTimer -= dt;
            if (game.comboTimer <= 0) {
                game.combo = 0;
            }
        }

        // Power-up timer
        if (game.powerUp && game.powerUp !== 'heal') {
            game.powerUpTimer -= dt;
            if (game.powerUpTimer <= 0) {
                game.powerUp = null;
                document.getElementById('powerUpIndicator').style.opacity = '0';
            }
        }

        // Slow motion timer
        if (game.slowMotion) {
            game.slowMotionTimer -= dt;
            if (game.slowMotionTimer <= 0) game.slowMotion = false;
        }

        // Player movement
        if (useMouseControl) {
            const diff = mouseX - player.x;
            player.x += diff * 0.12 * timeMult;
        } else {
            if (keys['ArrowLeft'] || keys['KeyA']) player.x -= CONFIG.PLAYER_SPEED * timeMult;
            if (keys['ArrowRight'] || keys['KeyD']) player.x += CONFIG.PLAYER_SPEED * timeMult;
        }
        player.x = Math.max(22, Math.min(CONFIG.WIDTH - 22, player.x));

        if (player.invincible > 0) player.invincible--;

        // Firing
        if (keys['Space'] || mouseDown) fireBullet();

        // Update stars
        stars.forEach(star => {
            star.y += star.speed * timeMult;
            star.twinkle += 0.05;
            if (star.y > CONFIG.HEIGHT) {
                star.y = 0;
                star.x = Math.random() * CONFIG.WIDTH;
            }
        });

        // Update bullets
        bullets.forEach(b => {
            b.y -= b.speed * timeMult;
            b.rotation += b.rotSpeed;
        });
        bullets = bullets.filter(b => b.y > -20);

        // Spawn enemies
        if (!game.waveTransition && game.waveEnemiesLeft > 0) {
            if (Math.random() < 0.02 + game.wave * 0.005) {
                spawnEnemy();
                game.waveEnemiesLeft--;
            }
        }

        // Check wave completion
        if (!game.waveTransition && game.waveEnemiesLeft <= 0 && enemies.length === 0) {
            game.waveTransition = true;
            game.waveTransitionTimer = 120;
        }

        if (game.waveTransition) {
            game.waveTransitionTimer--;
            if (game.waveTransitionTimer <= 0) {
                game.wave++;
                document.querySelector('#waveDisplay .wave-value').textContent = game.wave;
                startWave();
            }
        }

        // Update enemies
        enemies.forEach(enemy => {
            enemy.wobble += enemy.wobbleSpeed;
            enemy.x += Math.sin(enemy.wobble) * enemy.wobbleAmount * 0.02 * timeMult;
            enemy.y += enemy.speed * timeMult;
            if (enemy.flash > 0) enemy.flash--;
        });
        enemies = enemies.filter(e => e.y < CONFIG.HEIGHT + 50);

        // Bullet-Enemy collision
        bullets.forEach(bullet => {
            enemies.forEach(enemy => {
                if (circleCollision(bullet, enemy, bullet.size * 0.5, enemy.size * 0.5)) {
                    enemy.currentHp -= bullet.damage;
                    enemy.flash = 6;
                    bullet.y = -100; // Remove bullet

                    spawnExplosion(bullet.x, bullet.y, `hsl(${120 + Math.random() * 30}, 80%, 55%)`, 4);

                    if (enemy.currentHp <= 0) {
                        // Enemy destroyed
                        game.combo++;
                        game.comboTimer = 2000;
                        if (game.combo > game.maxCombo) game.maxCombo = game.combo;

                        const comboMult = Math.min(game.combo, 10);
                        const points = enemy.score * comboMult;
                        game.score += points;

                        spawnFloatingText(enemy.x, enemy.y, `+${points}`,
                            comboMult > 1 ? `hsl(${280 + comboMult * 10}, 80%, 70%)` : '#fff');

                        if (comboMult > 1) {
                            spawnFloatingText(enemy.x, enemy.y + 22, `${comboMult}x COMBO`, '#ce93d8');
                        }

                        spawnExplosion(enemy.x, enemy.y, undefined, 12);
                        game.shakeAmount = 4;

                        spawnPowerUp(enemy.x, enemy.y);

                        enemy.y = CONFIG.HEIGHT + 100; // Remove enemy

                        document.querySelector('#scoreDisplay .score-value').textContent = game.score.toLocaleString();
                    }
                }
            });
        });

        // Player-Enemy collision
        if (player.invincible <= 0) {
            enemies.forEach(enemy => {
                if (circleCollision(player, enemy, 16, enemy.size * 0.4)) {
                    game.lives--;
                    player.invincible = 90;
                    game.shakeAmount = 10;
                    game.combo = 0;
                    game.slowMotion = true;
                    game.slowMotionTimer = 500;

                    spawnExplosion(player.x, player.y, '#ef5350', 16);
                    enemy.y = CONFIG.HEIGHT + 100;

                    updateLivesDisplay();

                    if (game.lives <= 0) {
                        gameOver();
                    }
                }
            });
        }

        // Update power-ups
        powerUps.forEach(pu => {
            pu.y += pu.vy * timeMult;
            pu.time += 0.05;
        });

        // Player-PowerUp collision
        powerUps.forEach(pu => {
            if (circleCollision(player, pu, 20, pu.size)) {
                if (pu.type === 'heal') {
                    game.lives = Math.min(game.lives + 1, 5);
                    updateLivesDisplay();
                    spawnFloatingText(pu.x, pu.y, 'HEAL!', '#66bb6a');
                } else {
                    game.powerUp = pu.type;
                    game.powerUpTimer = 8000;
                    const indicator = document.getElementById('powerUpIndicator');
                    indicator.textContent = `${pu.emoji} ${pu.label}`;
                    indicator.style.color = pu.color;
                    indicator.style.opacity = '1';
                    spawnFloatingText(pu.x, pu.y, pu.label, pu.color);
                }
                spawnExplosion(pu.x, pu.y, pu.color, 8);
                pu.y = CONFIG.HEIGHT + 100;
            }
        });

        powerUps = powerUps.filter(pu => pu.y < CONFIG.HEIGHT + 30);

        // Update particles
        particles.forEach(p => {
            p.x += p.vx * timeMult;
            p.y += p.vy * timeMult;
            p.vx *= 0.96;
            p.vy *= 0.96;
            p.life--;
        });
        particles = particles.filter(p => p.life > 0);

        // Update floating texts
        floatingTexts.forEach(ft => {
            ft.y += ft.vy * timeMult;
            ft.vy *= 0.97;
            ft.life--;
        });
        floatingTexts = floatingTexts.filter(ft => ft.life > 0);

        // Update combo display
        const comboEl = document.getElementById('comboDisplay');
        if (game.combo > 1) {
            comboEl.style.opacity = '1';
            document.querySelector('#comboDisplay .combo-value').textContent = `x${game.combo}`;
        } else {
            comboEl.style.opacity = '0';
        }
    }

    // ===== RENDER =====
    function render() {
        ctx.save();

        // Screen shake
        if (game.shakeAmount > 0.5) {
            ctx.translate(
                (Math.random() - 0.5) * game.shakeAmount,
                (Math.random() - 0.5) * game.shakeAmount
            );
        }

        // Background
        const bgGrad = ctx.createLinearGradient(0, 0, 0, CONFIG.HEIGHT);
        bgGrad.addColorStop(0, '#050510');
        bgGrad.addColorStop(0.5, '#0a0a2e');
        bgGrad.addColorStop(1, '#0d1117');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

        // Stars
        stars.forEach(star => {
            const alpha = star.brightness + Math.sin(star.twinkle) * 0.2;
            ctx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fill();
        });

        // Nebula effect
        const nebulaGrad = ctx.createRadialGradient(
            CONFIG.WIDTH * 0.3, CONFIG.HEIGHT * 0.4, 0,
            CONFIG.WIDTH * 0.3, CONFIG.HEIGHT * 0.4, 200
        );
        nebulaGrad.addColorStop(0, 'rgba(76, 175, 80, 0.03)');
        nebulaGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = nebulaGrad;
        ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

        const nebulaGrad2 = ctx.createRadialGradient(
            CONFIG.WIDTH * 0.7, CONFIG.HEIGHT * 0.6, 0,
            CONFIG.WIDTH * 0.7, CONFIG.HEIGHT * 0.6, 150
        );
        nebulaGrad2.addColorStop(0, 'rgba(156, 39, 176, 0.02)');
        nebulaGrad2.addColorStop(1, 'transparent');
        ctx.fillStyle = nebulaGrad2;
        ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

        // Power-ups
        powerUps.forEach(pu => {
            ctx.save();
            ctx.globalAlpha = 0.3 + Math.sin(pu.time * 3) * 0.1;
            ctx.fillStyle = pu.color;
            ctx.shadowColor = pu.color;
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(pu.x, pu.y, pu.size + 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            drawEmoji(pu.emoji, pu.x, pu.y, pu.size * 1.8);
        });

        // Bullets (broccoli)
        bullets.forEach(b => {
            // Trail glow
            ctx.save();
            const trailGrad = ctx.createRadialGradient(b.x, b.y + 8, 0, b.x, b.y + 8, b.size);
            trailGrad.addColorStop(0, 'rgba(76, 175, 80, 0.4)');
            trailGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = trailGrad;
            ctx.beginPath();
            ctx.arc(b.x, b.y + 8, b.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            drawBroccoli(b.x, b.y, b.size * 1.8, b.rotation);
        });

        // Enemies
        enemies.forEach(enemy => {
            if (enemy.flash > 0) {
                ctx.save();
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.shadowColor = '#fff';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.size * 0.6, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // HP bar
            if (enemy.hp > 1) {
                const barWidth = enemy.size * 1.2;
                const barHeight = 4;
                const barX = enemy.x - barWidth / 2;
                const barY = enemy.y - enemy.size * 0.7;

                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(barX, barY, barWidth, barHeight);

                const hpRatio = enemy.currentHp / enemy.hp;
                const hpColor = hpRatio > 0.5 ? '#66bb6a' : hpRatio > 0.25 ? '#ffa726' : '#ef5350';
                ctx.fillStyle = hpColor;
                ctx.fillRect(barX, barY, barWidth * hpRatio, barHeight);
            }

            drawEmoji(enemy.emoji, enemy.x, enemy.y, enemy.size * 1.3);
        });

        // Player
        drawPlayer();

        // Particles
        particles.forEach(p => {
            const alpha = p.life / p.maxLife;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });

        // Floating texts
        floatingTexts.forEach(ft => {
            const alpha = ft.life / ft.maxLife;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = ft.color;
            ctx.font = `bold 16px 'Orbitron', sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = ft.color;
            ctx.shadowBlur = 10;
            ctx.fillText(ft.text, ft.x, ft.y);
            ctx.restore();
        });

        // Wave transition text
        if (game.waveTransition) {
            const alpha = Math.min(1, game.waveTransitionTimer / 30);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#ffd54f';
            ctx.font = `bold 36px 'Orbitron', sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#ff9800';
            ctx.shadowBlur = 20;
            ctx.fillText(`WAVE ${game.wave + 1}`, CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2);
            ctx.font = `18px 'Noto Sans JP', sans-serif`;
            ctx.fillStyle = '#ffcc80';
            ctx.shadowBlur = 10;
            ctx.fillText('準備せよ！', CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2 + 40);
            ctx.restore();
        }

        ctx.restore();
    }

    // ===== GAME LOOP =====
    let lastTime = 0;
    function gameLoop(timestamp) {
        if (!game.running) return;

        const dt = timestamp - lastTime;
        lastTime = timestamp;

        update(dt);
        render();

        requestAnimationFrame(gameLoop);
    }

    // ===== GAME CONTROL =====
    function updateLivesDisplay() {
        document.getElementById('livesDisplay').textContent = '❤️'.repeat(game.lives);
    }

    function startGame() {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('gameOverScreen').style.display = 'none';

        game = {
            running: true,
            score: 0,
            lives: 3,
            wave: 1,
            combo: 0,
            maxCombo: 0,
            comboTimer: 0,
            highScore: parseInt(localStorage.getItem('broccoliHighScore') || '0'),
            lastFireTime: 0,
            powerUp: null,
            powerUpTimer: 0,
            shakeAmount: 0,
            waveEnemiesLeft: 0,
            waveTransition: false,
            waveTransitionTimer: 0,
            slowMotion: false,
            slowMotionTimer: 0,
        };

        player = createPlayer();
        bullets = [];
        enemies = [];
        particles = [];
        powerUps = [];
        floatingTexts = [];

        initStars();
        startWave();
        updateLivesDisplay();

        document.querySelector('#scoreDisplay .score-value').textContent = '0';
        document.querySelector('#waveDisplay .wave-value').textContent = '1';
        document.getElementById('comboDisplay').style.opacity = '0';
        document.getElementById('powerUpIndicator').style.opacity = '0';

        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    }

    function gameOver() {
        game.running = false;

        if (game.score > game.highScore) {
            game.highScore = game.score;
            localStorage.setItem('broccoliHighScore', game.score.toString());
        }

        document.getElementById('finalScoreValue').textContent = game.score.toLocaleString();
        document.getElementById('highScoreText').textContent =
            `ハイスコア: ${game.highScore.toLocaleString()} ／ 最大コンボ: ${game.maxCombo}x`;

        setTimeout(() => {
            document.getElementById('gameOverScreen').style.display = 'flex';
        }, 600);
    }

    // ===== BACKGROUND ANIMATION FOR MENUS =====
    function menuAnimation() {
        if (game.running) return;

        ctx.clearRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

        const bgGrad = ctx.createLinearGradient(0, 0, 0, CONFIG.HEIGHT);
        bgGrad.addColorStop(0, '#050510');
        bgGrad.addColorStop(0.5, '#0a0a2e');
        bgGrad.addColorStop(1, '#0d1117');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

        stars.forEach(star => {
            star.y += star.speed * 0.3;
            star.twinkle += 0.03;
            if (star.y > CONFIG.HEIGHT) {
                star.y = 0;
                star.x = Math.random() * CONFIG.WIDTH;
            }
            const alpha = star.brightness + Math.sin(star.twinkle) * 0.2;
            ctx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fill();
        });

        requestAnimationFrame(menuAnimation);
    }

    // ===== RANKING (GitHub Issues) =====
    const REPO_OWNER = 'Shunichi-Takeda';
    const REPO_NAME = 'narekan-shooting';

    function generateScoreIssueURL() {
        const title = `🏆 ${game.score} pts | Wave ${game.wave} | Combo x${game.maxCombo}`;
        const body = [
            '<!-- 🥦 ブロッコリーシューター スコア登録 -->',
            '<!-- ⚠️ タイトルを変更しないでください -->',
            '',
            '| 項目 | 値 |',
            '|---|---|',
            `| スコア | ${game.score.toLocaleString()} |`,
            `| ウェーブ | ${game.wave} |`,
            `| 最大コンボ | x${game.maxCombo} |`,
            `| 日時 | ${new Date().toLocaleString('ja-JP')} |`,
        ].join('\n');

        const params = new URLSearchParams({
            labels: 'score',
            title: title,
            body: body,
        });

        return `https://github.com/${REPO_OWNER}/${REPO_NAME}/issues/new?${params.toString()}`;
    }

    function openScoreRegistration() {
        window.open(generateScoreIssueURL(), '_blank');
    }

    let rankingCache = null;
    let rankingCacheTime = 0;
    const RANKING_CACHE_TTL = 60000;

    async function fetchRanking() {
        const listEl = document.getElementById('rankingList');

        if (rankingCache && Date.now() - rankingCacheTime < RANKING_CACHE_TTL) {
            renderRanking(rankingCache);
            return;
        }

        listEl.innerHTML = '<div class="ranking-loading">読み込み中...</div>';

        try {
            const res = await fetch(
                `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?state=open&per_page=100&sort=created&direction=desc`,
                { headers: { 'Accept': 'application/vnd.github.v3+json' } }
            );
            if (!res.ok) throw new Error(`API error: ${res.status}`);

            const issues = await res.json();

            const scores = issues
                .map(issue => {
                    const match = issue.title.match(/🏆\s*(\d+)\s*pts/);
                    const waveMatch = issue.title.match(/Wave\s*(\d+)/);
                    const comboMatch = issue.title.match(/Combo\s*x(\d+)/);
                    if (!match) return null;
                    return {
                        score: parseInt(match[1]),
                        wave: waveMatch ? parseInt(waveMatch[1]) : 0,
                        combo: comboMatch ? parseInt(comboMatch[1]) : 0,
                        user: issue.user.login,
                        avatar: issue.user.avatar_url,
                    };
                })
                .filter(Boolean)
                .sort((a, b) => b.score - a.score)
                .slice(0, 20);

            rankingCache = scores;
            rankingCacheTime = Date.now();
            renderRanking(scores);
        } catch (e) {
            listEl.innerHTML = '<div class="ranking-error">ランキングの取得に失敗しました</div>';
        }
    }

    function renderRanking(scores) {
        const listEl = document.getElementById('rankingList');
        if (scores.length === 0) {
            listEl.innerHTML = '<div class="ranking-empty">まだスコアが登録されていません<br>ゲームをプレイしてスコアを登録しよう！</div>';
            return;
        }
        listEl.innerHTML = scores
            .map((s, i) => {
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}.`;
                return `<div class="ranking-item ${i < 3 ? 'ranking-top3' : ''}">
                    <span class="ranking-rank">${medal}</span>
                    <img class="ranking-avatar" src="${s.avatar}" alt="" width="24" height="24">
                    <span class="ranking-name">${s.user}</span>
                    <span class="ranking-score">${s.score.toLocaleString()} pts</span>
                </div>`;
            })
            .join('');
    }

    function showRanking() {
        document.getElementById('rankingModal').style.display = 'flex';
        const highScore = parseInt(localStorage.getItem('broccoliHighScore') || '0');
        document.getElementById('rankingLocalScore').textContent = highScore.toLocaleString();
        fetchRanking();
    }

    function hideRanking() {
        document.getElementById('rankingModal').style.display = 'none';
    }

    // Init
    initStars();
    menuAnimation();
    </script>
