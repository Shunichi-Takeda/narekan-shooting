<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ベジタブルキングダム ～最後の収穫祭～</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'DotGothic16', 'Noto Sans JP', sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            overflow: hidden;
            border: 3px solid #333;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 80px rgba(0,0,0,0.3);
        }

        @media (max-width: 820px) {
            #gameContainer {
                width: 100vw;
                height: 100vh;
                border: none;
            }
        }

        /* CRT scanline effect */
        #gameContainer::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.15) 0px,
                rgba(0,0,0,0.15) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 100;
        }

        #background {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            transition: background 1.5s ease;
            background: #0a0a1a;
        }

        #screenFlash {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
            transition: opacity 0.1s;
        }

        #fade {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: black;
            opacity: 0;
            pointer-events: none;
            z-index: 60;
            transition: opacity 0.8s ease;
        }

        /* Character area */
        #characterArea {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            transition: opacity 0.5s;
        }

        #characterEmoji {
            font-size: 120px;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.3));
            transition: all 0.5s ease;
            animation: characterFloat 4s ease-in-out infinite;
        }

        @keyframes characterFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        #characterLabel {
            margin-top: 8px;
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 3px;
        }

        /* Text window */
        #textWindow {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 220px;
            background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(0,5,0,0.95) 100%);
            border-top: 2px solid rgba(100,200,100,0.3);
            z-index: 20;
            padding: 0 30px 20px 30px;
            display: flex;
            flex-direction: column;
        }

        #speakerName {
            font-size: 15px;
            color: #8fc98f;
            padding: 10px 0 8px 0;
            letter-spacing: 3px;
            min-height: 35px;
            text-shadow: 0 0 10px rgba(100,200,100,0.5);
        }

        #speakerName::before {
            content: '◆ ';
            color: rgba(100,200,100,0.5);
        }

        #speakerName:empty::before {
            content: '';
        }

        #textContent {
            font-size: 17px;
            color: #d0e8d0;
            line-height: 1.9;
            flex: 1;
            letter-spacing: 1px;
        }

        #textCursor {
            display: inline-block;
            width: 14px;
            height: 14px;
            margin-left: 4px;
            border: 2px solid #8fc98f;
            border-top: none;
            border-left: none;
            transform: rotate(45deg) translateY(-2px);
            animation: cursorBlink 1s ease-in-out infinite;
            vertical-align: middle;
        }

        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        #clickPrompt {
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 11px;
            color: rgba(143,201,143,0.4);
            letter-spacing: 2px;
        }

        /* Choices */
        #choicesContainer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
            display: none;
            flex-direction: column;
            gap: 12px;
            width: 70%;
            max-width: 500px;
        }

        .choice-btn {
            font-family: 'DotGothic16', 'Noto Sans JP', sans-serif;
            font-size: 16px;
            color: #c0e0c0;
            background: rgba(0, 20, 0, 0.85);
            border: 2px solid rgba(100, 200, 100, 0.4);
            padding: 16px 24px;
            cursor: pointer;
            text-align: left;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            position: relative;
        }

        .choice-btn::before {
            content: '▶ ';
            color: rgba(100, 200, 100, 0.6);
            transition: color 0.2s;
        }

        .choice-btn:hover {
            background: rgba(0, 40, 0, 0.9);
            border-color: rgba(100, 200, 100, 0.8);
            color: #e0ffe0;
            box-shadow: 0 0 20px rgba(100, 200, 100, 0.2), inset 0 0 30px rgba(100, 200, 100, 0.05);
            transform: translateX(4px);
        }

        .choice-btn:hover::before {
            color: #8fc98f;
        }

        /* Title screen */
        #titleScreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 40;
            background: radial-gradient(ellipse at center, #0a1a0a 0%, #000 80%);
        }

        .title-emoji {
            font-size: 80px;
            animation: characterFloat 3s ease-in-out infinite;
            margin-bottom: 20px;
        }

        .title-main {
            font-size: 28px;
            color: #8fc98f;
            letter-spacing: 6px;
            text-shadow: 0 0 20px rgba(100,200,100,0.5);
            margin-bottom: 8px;
        }

        .title-sub {
            font-size: 18px;
            color: rgba(200,160,100,0.8);
            letter-spacing: 4px;
            margin-bottom: 50px;
            text-shadow: 0 0 10px rgba(200,160,100,0.3);
        }

        .title-start {
            font-family: 'DotGothic16', sans-serif;
            font-size: 16px;
            color: #8fc98f;
            background: none;
            border: 2px solid rgba(100,200,100,0.4);
            padding: 14px 50px;
            cursor: pointer;
            letter-spacing: 4px;
            transition: all 0.3s;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { box-shadow: 0 0 10px rgba(100,200,100,0.1); }
            50% { box-shadow: 0 0 25px rgba(100,200,100,0.3); }
        }

        .title-start:hover {
            background: rgba(0,40,0,0.5);
            border-color: #8fc98f;
            box-shadow: 0 0 30px rgba(100,200,100,0.3);
        }

        .title-credit {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: rgba(100,200,100,0.3);
            letter-spacing: 2px;
        }

        /* Ending screen */
        #endingScreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 40;
            background: rgba(0,0,0,0.95);
        }

        .ending-label {
            font-size: 14px;
            color: rgba(200,160,100,0.6);
            letter-spacing: 4px;
            margin-bottom: 12px;
        }

        .ending-title {
            font-size: 26px;
            color: #8fc98f;
            letter-spacing: 6px;
            text-shadow: 0 0 20px rgba(100,200,100,0.5);
            margin-bottom: 40px;
        }

        .ending-btn {
            font-family: 'DotGothic16', sans-serif;
            font-size: 14px;
            color: #8fc98f;
            background: none;
            border: 1px solid rgba(100,200,100,0.3);
            padding: 12px 40px;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.3s;
        }

        .ending-btn:hover {
            background: rgba(0,40,0,0.5);
            border-color: #8fc98f;
        }

        .ending-extra {
            font-size: 15px;
            color: rgba(200,160,100,0.7);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* Version */
        .version {
            position: absolute;
            bottom: 4px;
            right: 8px;
            font-size: 10px;
            color: rgba(100,200,100,0.25);
            z-index: 90;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="background"></div>
        <div id="screenFlash"></div>
        <div id="fade"></div>

        <div id="characterArea">
            <div id="characterEmoji"></div>
            <div id="characterLabel"></div>
        </div>

        <div id="textWindow">
            <div id="speakerName"></div>
            <div id="textContent"></div>
            <div id="clickPrompt">CLICK / SPACE</div>
        </div>

        <div id="choicesContainer"></div>

        <div id="titleScreen">
            <div class="title-emoji">🥦</div>
            <div class="title-main">ベジタブルキングダム</div>
            <div class="title-sub">～最後の収穫祭～</div>
            <button class="title-start" onclick="startGame()">はじめる</button>
            <div class="title-credit">by メディア&広報チーム</div>
        </div>

        <div id="endingScreen">
            <div class="ending-label" id="endingLabel"></div>
            <div class="ending-title" id="endingTitle"></div>
            <div class="ending-extra" id="endingExtra"></div>
            <button class="ending-btn" onclick="backToTitle()">タイトルに戻る</button>
        </div>

        <div class="version">v1.0</div>
    </div>

    <script>
    // ===== AUDIO =====
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function playBeep(freq = 600, dur = 0.025, vol = 0.04) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.value = freq;
        gain.gain.value = vol;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
    }
    function playChoiceSound() { playBeep(880, 0.08, 0.06); }
    function playFlashSound() { playBeep(200, 0.3, 0.08); }

    // ===== GAME STATE =====
    let state = { trust: 0, route: '', companion: '', companionEmoji: '' };
    let currentSceneId = '';
    let currentMessages = [];
    let msgIndex = 0;
    let isTyping = false;
    let typeTimer = null;
    let fullText = '';

    // ===== STORY DATA =====
    const SCENES = {
        // --- PROLOGUE ---
        prologue: [
            { text: 'ここは、ベジタブルキングダム。', bg: '#0a0a10' },
            { text: '野菜たちが暮らす、小さくも温かい世界。\n緑豊かな丘、穏やかな風、そして変わらない日常。', bg: '#0a1a0a' },
            { text: '誰もがこの平和が永遠に続くと信じていた。\n\n……その日が来るまでは。', bg: '#0a0a10' },
            { type: 'next', target: 'intro' }
        ],

        intro: [
            { speaker: 'ブロッコリー', emoji: '🥦', text: 'ん……朝か。\n今日もいい天気だな。' , bg: '#0a1a0a' },
            { text: 'グリーンヒルズ村。\n見習い騎士のブロッコリーは、いつものように\n目を覚ました。' },
            { text: '窓の外には見慣れた景色が広がっている。\n……ただ、空がやけに近い気がするのは、\nきっと気のせいだ。' },
            { speaker: 'トマト', emoji: '🍅', text: 'おーい、ブロッコリー！\n遅いぞ！ 朝の訓練、もう始まってるよ！' },
            { type: 'next', target: 'training' }
        ],

        training: [
            { speaker: 'ブロッコリー', emoji: '🥦', text: 'トマト、今日も朝から元気だな……' },
            { speaker: 'トマト', emoji: '🍅', text: '当たり前だろ！\n僕たちはいつか王国を守る騎士になるんだ！\nさあ、剣の稽古をしよう！' },
            { text: '二人は幼い頃からの親友だった。\nトマトの赤い頬が、朝日に照らされて\n輝いている。' },
            { text: '穏やかな時間が流れる。\nこの日常がずっと続くと、誰もが信じていた。' },
            { type: 'next', target: 'darkness' }
        ],

        darkness: [
            { text: 'その時————', bg: '#050508', flash: true },
            { text: '突然、空が暗くなった。\n\n巨大な影が、世界を覆い尽くす。', bg: '#08050a' },
            { speaker: 'トマト', emoji: '🍅', text: 'な、なんだ!?\n空が……！' },
            { speaker: 'ブロッコリー', emoji: '🥦', text: '空が……四角く見える……。\nいや、まさか……。' },
            { text: 'それは一瞬のことだった。\nだが、全員の心に\n不安の種を植え付けるには十分だった。', bg: '#0a0a10' },
            { type: 'next', target: 'prophecy' }
        ],

        prophecy: [
            { speaker: 'ニンジン長老', emoji: '🥕', text: '皆の者、聞いてくれ！', bg: '#1a0a0a' },
            { text: 'ニンジン長老が息を切らして\n広場に駆け込んできた。\nその顔は蒼白だった。' },
            { speaker: 'ニンジン長老', emoji: '🥕', text: '古の予言書を解読した。\n「大いなる収穫」が……\nあと三日で、この世界に訪れる。' },
            { speaker: 'ブロッコリー', emoji: '🥦', text: '大いなる収穫……？\nそれは一体……' },
            { speaker: 'ニンジン長老', emoji: '🥕', text: '予言によれば、世界の終わりだ。\n\nだが、唯一の希望がある。' },
            { speaker: 'ニンジン長老', emoji: '🥕', text: '伝説の「永遠の種」。\nそれを見つければ、我々は救われる。\n北の果て、コーン王の城に手がかりがあるはずだ。' },
            { type: 'next', target: 'resolve' }
        ],

        resolve: [
            { speaker: 'ブロッコリー', emoji: '🥦', text: '……僕が行きます。\n永遠の種を探しに。', bg: '#0a1a0a' },
            { speaker: 'ニンジン長老', emoji: '🥕', text: 'ブロッコリー……。\nお前ならできる。信じておるぞ。' },
            { speaker: 'ブロッコリー', emoji: '🥦', text: '必ず見つけて、みんなを守ってみせる。' },
            { type: 'next', target: 'choice1' }
        ],

        // --- CHOICE 1: COMPANION ---
        choice1: [
            { speaker: 'ブロッコリー', emoji: '🥦', text: '（一人で行くべきか……\n　それとも……）' },
            {
                type: 'choice',
                options: [
                    { text: 'トマト、一緒に来てくれるか？', target: 'with_tomato' },
                    { text: 'これは一人で行かなければ', target: 'alone' }
                ]
            }
        ],

        // --- TOMATO ROUTE ---
        with_tomato: [
            { speaker: 'トマト', emoji: '🍅', text: 'もちろんさ！\n親友を一人で行かせるわけないだろ！', bg: '#0a1a0a',
              effect: () => { state.route = 'tomato'; state.companion = 'トマト'; state.companionEmoji = '🍅'; } },
            { speaker: 'ブロッコリー', emoji: '🥦', text: '……ありがとう、トマト。\n心強いよ。' },
            { text: '二人は北への道を歩き始めた。\n\n地面はやけに平らで、\nまるで磨き上げられた板のようだった。' },
            { type: 'next', target: 'meet_eggplant' }
        ],

        meet_eggplant: [
            { text: '旅を始めて半日。\n森の入口で、一人の旅人に出会った。', bg: '#0a0a1a' },
            { speaker: 'ナス', emoji: '🍆', text: 'やあ、旅の方ですか。\n私はナス。この先の道に詳しいのですが……\nご一緒してもよろしいでしょうか。' },
            { speaker: 'トマト', emoji: '🍅', text: 'うーん……\nなんか怪しくないか……？' },
            { speaker: 'ブロッコリー', emoji: '🥦', text: '（ナスの目は真っすぐだ。\n　でも、この時勢、誰を信じていいのか……）' },
            {
                type: 'choice',
                options: [
                    { text: 'ぜひ、一緒に行こう', target: 'eggplant_join', effect: () => { state.trust++; } },
                    { text: 'すまないが、先を急いでいる', target: 'eggplant_decline' }
                ]
            }
        ],

        eggplant_join: [
            { speaker: 'ナス', emoji: '🍆', text: 'ありがとうございます。\n……実は、私もあの予言について\n知っているのです。', bg: '#0a0a1a' },
            { speaker: 'トマト', emoji: '🍅', text: 'えっ!? 本当に？' },
            { speaker: 'ナス', emoji: '🍆', text: 'この世界には……\n私たちが知らない秘密がある。\nコーン王の城で、全てがわかるでしょう。' },
            { speaker: 'ブロッコリー', emoji: '🥦', text: '秘密……？' },
            { text: '三人は不安を胸に、北への道を急いだ。' },
            { type: 'next', target: 'strange_world' }
        ],

        eggplant_decline: [
            { speaker: 'ナス', emoji: '🍆', text: '……そうですか。\nでは、一つだけ忠告を。', bg: '#0a0a1a' },
            { speaker: 'ナス', emoji: '🍆', text: 'この世界の「端」に行ったら……\n壁に触れてみてください。\nきっと、何かがわかるはずです。' },
            { speaker: 'ブロッコリー', emoji: '🥦', text: '壁……？\n（一体、何のことだろう……）' },
            { text: '二人はナスに別れを告げ、先を急いだ。' },
            { type: 'next', target: 'strange_world' }
        ],

        // --- ALONE ROUTE ---
        alone: [
            { speaker: 'トマト', emoji: '🍅', text: 'え……一人で？\n危険だよ！', bg: '#0a1a0a',
              effect: () => { state.route = 'alone'; } },
            { speaker: 'ブロッコリー', emoji: '🥦', text: 'みんなを守れるのは僕だけだ。\nトマト、村をよろしく頼む。' },
            { speaker: 'トマト', emoji: '🍅', text: '……わかった。\n絶対に、帰ってこいよ。約束だ。' },
            { text: 'ブロッコリーは一人、北への道を歩き始めた。\n\n孤独な旅路。\n風だけが、背中を押してくれた。' },
            { type: 'next', target: 'find_onion' }
        ],

        find_onion: [
            { text: '荒野を進むこと数時間。\n道端に倒れている者がいた。', bg: '#1a0a0a' },
            { speaker: 'タマネギ', emoji: '🧅', text: 'う、うう……\n誰か……助けて……' },
            { text: '衛兵隊長のタマネギだった。\n偵察任務中に負傷したらしい。\n涙を流しながら苦しんでいる。' },
            { speaker: 'ブロッコリー', emoji: '🥦', text: 'タマネギ隊長！\nしっかりしてください！' },
            {
                type: 'choice',
                options: [
                    { text: '手当てをしよう。見捨てられない', target: 'onion_help', effect: () => { state.trust++; } },
                    { text: '急がなければ。世界の命運がかかっている', target: 'onion_pass' }
                ]
            }
        ],

        onion_help: [
            { speaker: 'タマネギ', emoji: '🧅', text: 'うう……ありがとう……\nブロッコリー……（涙）',
              effect: () => { state.companion = 'タマネギ'; state.companionEmoji = '🧅'; } },
            { speaker: 'ブロッコリー', emoji: '🥦', text: '泣かないでください、隊長。\n大丈夫ですから。' },
            { speaker: 'タマネギ', emoji: '🧅', text: 'いや……嬉しくて……。\nお礼に教えよう。\nコーン王の城への近道を知っている！' },
            { speaker: 'タマネギ', emoji: '🧅', text: '一人では行かせん。\n付いて行くぞ！' },
            { text: '思わぬ仲間を得て、\nブロッコリーは旅を続けた。' },
            { type: 'next', target: 'strange_world' }
        ],

        onion_pass: [
            { speaker: 'タマネギ', emoji: '🧅', text: '……行け……\n世界を……救え……' },
            { speaker: 'ブロッコリー', emoji: '🥦', text: '（……すまない、タマネギ隊長。\n　必ず、必ず救ってみせる）' },
            { text: 'ブロッコリーは後ろ髪を引かれながら\n先を急いだ。\n\n一人きりの旅は、果てしなく長く感じた。' },
            { type: 'next', target: 'strange_world' }
        ],

        // --- MERGE: STRANGE WORLD ---
        strange_world: [
            { text: 'コーン王の城が見えてきた頃——\nブロッコリーは奇妙なことに気づいた。', bg: '#0a0a1a' },
            { speaker: 'ブロッコリー', emoji: '🥦', text: '……なんだ、これは。\n世界の端に……壁がある。\n透明な壁だ。' },
            { text: '壁の向こうに、見たこともない巨大な構造物が\n見えた。銀色に光る、途方もなく大きな何か。' },

            { text: '世界が白く凍りついていく。\n\n冷蔵庫の扉が、ゆっくりと閉じた。', bg: '#0a0a2a', flash: true },
            { speaker: 'ブロッコリー', emoji: '🥦', text: '寒い……。\nとても、寒い……。\n\n誰か……。' },
            { text: '暗闇の中、ブロッコリーの意識は\n遠のいていった。', bg: '#020204' },
            { type: 'ending', label: 'ENDING 4', title: '永遠の冬', extra: '' }

    // ===== GAME ENGINE =====
    const els = {
        bg: document.getElementById('background'),
        flash: document.getElementById('screenFlash'),
        fade: document.getElementById('fade'),
        charArea: document.getElementById('characterArea'),
        charEmoji: document.getElementById('characterEmoji'),
        charLabel: document.getElementById('characterLabel'),
        speaker: document.getElementById('speakerName'),
        text: document.getElementById('textContent'),
        prompt: document.getElementById('clickPrompt'),
        choices: document.getElementById('choicesContainer'),
        title: document.getElementById('titleScreen'),
        ending: document.getElementById('endingScreen'),
        textWindow: document.getElementById('textWindow'),
    };

    function resolveValue(v) {
        return typeof v === 'function' ? v() : v;
    }

    function startGame() {
        initAudio();
        state = { trust: 0, route: '', companion: '', companionEmoji: '' };
        els.title.style.display = 'none';
        els.ending.style.display = 'none';
        els.textWindow.style.display = 'flex';
        els.charArea.style.opacity = '1';
        loadScene('prologue');
    }

    function backToTitle() {
        els.ending.style.display = 'none';
        els.textWindow.style.display = 'none';
        els.charArea.style.opacity = '0';
        els.title.style.display = 'flex';
        els.bg.style.background = '#0a0a1a';
    }

    function loadScene(sceneId) {
        currentSceneId = sceneId;
        currentMessages = SCENES[sceneId];
        if (!currentMessages) { console.error('Scene not found:', sceneId); return; }
        msgIndex = 0;
        showCurrentMessage();
    }

    function showCurrentMessage() {
        if (msgIndex >= currentMessages.length) return;

        const msg = currentMessages[msgIndex];

        // Execute effects
        if (msg.effect) msg.effect();

        // Handle special types
        if (msg.type === 'next') {
            const target = resolveValue(msg.target);
            fadeTransition(() => loadScene(target));
            return;
        }

        if (msg.type === 'choice') {
            showChoices(msg.options);
            return;
        }

        if (msg.type === 'ending') {
            showEnding(msg.label, msg.title, msg.extra);
            return;
        }

        // Background
        if (msg.bg) {
            els.bg.style.background = msg.bg;
        }

        // Flash effect
        if (msg.flash) {
            doFlash();
        }

        // Character
        const emoji = resolveValue(msg.emoji);
        if (emoji) {
            els.charEmoji.textContent = emoji;
            els.charArea.style.opacity = '1';
        } else if (!msg.speaker) {
            els.charArea.style.opacity = '0.3';
        }

        // Speaker name
        const speaker = resolveValue(msg.speaker);
        els.speaker.textContent = speaker || '';

        // Label
        if (speaker) {
            els.charLabel.textContent = speaker;
        }

        // Text with typewriter
        const text = resolveValue(msg.text);
        typewriterEffect(text);
    }

    function typewriterEffect(text) {
        fullText = text;
        els.text.textContent = '';
        els.prompt.style.opacity = '0';
        isTyping = true;
        let i = 0;

        clearInterval(typeTimer);
        typeTimer = setInterval(() => {
            if (i < text.length) {
                els.text.textContent += text[i];
                if (text[i] !== '\n' && text[i] !== ' ' && text[i] !== '　') {
                    playBeep(500 + Math.random() * 200, 0.02, 0.02);
                }
                i++;
            } else {
                clearInterval(typeTimer);
                isTyping = false;
                els.prompt.style.opacity = '1';
            }
        }, 40);
    }

    function skipTypewriter() {
        clearInterval(typeTimer);
        els.text.textContent = fullText;
        isTyping = false;
        els.prompt.style.opacity = '1';
    }

    function advance() {
        if (isTyping) {
            skipTypewriter();
            return;
        }

        msgIndex++;
        if (msgIndex < currentMessages.length) {
            showCurrentMessage();
        }
    }

    function showChoices(options) {
        els.choices.innerHTML = '';
        els.choices.style.display = 'flex';
        els.prompt.style.opacity = '0';
        els.textWindow.style.display = 'none';

        options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.textContent = opt.text;
            btn.onclick = () => {
                playChoiceSound();
                if (opt.effect) opt.effect();
                els.choices.style.display = 'none';
                els.textWindow.style.display = 'flex';
                fadeTransition(() => loadScene(opt.target));
            };
            els.choices.appendChild(btn);
        });
    }

    function showEnding(label, title, extra) {
        els.textWindow.style.display = 'none';
        els.charArea.style.opacity = '0';

        setTimeout(() => {
            els.fade.style.opacity = '1';
            setTimeout(() => {
                document.getElementById('endingLabel').textContent = label;
                document.getElementById('endingTitle').textContent = title;
                document.getElementById('endingExtra').textContent = extra || '';
                els.ending.style.display = 'flex';
                els.fade.style.opacity = '0';
            }, 1500);
        }, 1000);
    }

    function fadeTransition(callback) {
        els.fade.style.opacity = '1';
        setTimeout(() => {
            callback();
            els.fade.style.opacity = '0';
        }, 800);
    }

    function doFlash() {
        playFlashSound();
        els.flash.style.transition = 'none';
        els.flash.style.opacity = '0.8';
        setTimeout(() => {
            els.flash.style.transition = 'opacity 0.5s';
            els.flash.style.opacity = '0';
        }, 80);
    }

    // ===== INPUT =====
    document.addEventListener('click', (e) => {
        if (els.title.style.display !== 'none' && els.title.contains(e.target)) return;
        if (els.ending.style.display === 'flex') return;
        if (els.choices.style.display === 'flex') return;
        advance();
    });

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'Enter') {
            e.preventDefault();
            if (els.title.style.display !== 'none') return;
            if (els.ending.style.display === 'flex') return;
            if (els.choices.style.display === 'flex') return;
            advance();
        }
    });

    // ===== INIT =====
    els.textWindow.style.display = 'none';
    els.charArea.style.opacity = '0';
    </script>
